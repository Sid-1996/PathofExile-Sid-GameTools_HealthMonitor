name: Secure Auto Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  security-check:
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Verify tag
      id: check
      run: |
        # 驗證標籤格式
        if [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "should-release=true" >> $GITHUB_OUTPUT
          echo "✅ 標籤格式正確"
        else
          echo "should-release=false" >> $GITHUB_OUTPUT
          echo "❌ 標籤格式錯誤"
          exit 1
        fi
        
    - name: Check for malicious changes
      run: |
        # 檢查最近提交是否有可疑變更
        git log --oneline -10 | grep -E "(password|secret|key|token|backdoor)" && exit 1 || echo "✅ 無可疑變更"

  build-and-release:
    needs: security-check
    if: needs.security-check.outputs.should-release == 'true'
    runs-on: windows-latest
    permissions:
      contents: write  # 僅允許寫入內容
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Get version from _version.py
      id: get_version
      run: |
        python -c "import sys; sys.path.insert(0, 'src'); from _version import __version__; print(f'VERSION={__version__}')" > version.txt
        echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller opencv-python numpy pillow mss keyboard pygetwindow pyautogui psutil requests
        
    - name: Verify dependencies
      run: |
        # 驗證依賴完整性
        python -c "import cv2, numpy, PIL, mss, keyboard, pygetwindow, pyautogui, psutil, requests; print('✅ 所有依賴正常')"
        
    - name: Build EXE
      run: |
        python tools/build.py
        
    - name: Scan for viruses
      run: |
        # 基本安全掃描
        if exist "dist\GameTools_Package\*.exe" (
          echo "🔍 執行基本安全檢查..."
          # 檢查檔案大小（防止異常增大）
          for %%f in (dist\GameTools_Package\*.exe) do (
            if %%~zf GTR 100000000 (
              echo "❌ EXE 檔案大小異常"
              exit 1
            )
          )
          echo "✅ 基本安全檢查通過"
        )
        
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: GameTools_HealthMonitor_${{ github.ref_name }}
        body: |
          ## 🚀 自動發布版本 ${{ github.ref_name }}
          
          ### 📦 發布內容
          - 完整的 Windows 可執行檔
          - 包含所有必要的依賴庫
          - 多語言支持（中文/英文）
          
          ### 🔒 安全檢查
          - ✅ 依賴完整性驗證
          - ✅ 基本惡意軟體掃描
          - ✅ 檔案完整性檢查
          
          ### 📋 使用說明
          1. 下載並解壓縮包
          2. 雙擊 `GameTools_HealthMonitor.exe`
          3. 以管理員權限運行獲得最佳體驗
          
          ---
          🤖 此版本由 GitHub Actions 自動建構和發布
        draft: false
        prerelease: false
        
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/GameTools_HealthMonitor_v${{ steps.get_version.outputs.VERSION }}_Final.zip
        asset_name: GameTools_HealthMonitor_v${{ steps.get_version.outputs.VERSION }}_Final.zip
        asset_content_type: application/zip
